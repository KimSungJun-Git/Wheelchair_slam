<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheelchair SLAM UI - 통합 시스템</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body {
      margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background-color: #1a1b1e; font-family: 'Pretendard', sans-serif;
    }
    #root { box-shadow: 0 24px 48px rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden; user-select: none; }
    button { outline: none; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    @keyframes actPulse {
      0%   { transform: scale(0.8); opacity: 0.7; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes arrivalIn {
      0% { transform: scale(0.85); opacity: 0; }
      60% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes arrivalRing {
      0% { transform: scale(0.7); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes obstaclePulse1 { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes obstaclePulse2 { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes obstaclePulse3 { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes obstacleShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    /* 분할 파일 로딩 중 잠깐 보이는 placeholder */
    #loading {
      width: 1024px; height: 720px; display: flex; align-items: center; justify-content: center;
      color: #BFDBFE; font-size: 18px; font-weight: 700; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="root"><div id="loading">UI 로딩 중...</div></div>

  <!--
    ⚠️ 중요: 이 HTML은 file:// 로 열면 동작하지 않습니다 (CORS).
    rosbridge 옆에서 간단한 정적 서버를 띄워주세요. 예:
      cd <이 파일이 있는 폴더>
      python3 -m http.server 8000
    그 후 브라우저로 http://localhost:8000/Wheelchair_SLAM_UI.html 접속.

    파일 로드 순서가 중요합니다 (의존 관계: config → components → activity → map → screens → app).
    각 .jsx 파일은 ES module이 아니라 글로벌 스코프를 공유합니다.
  -->
  <script type="text/babel" data-presets="react" src="./js/config.js"></script>
  <script type="text/babel" data-presets="react" src="./js/components.jsx"></script>
  <script type="text/babel" data-presets="react" src="./js/activity.jsx"></script>
  <script type="text/babel" data-presets="react" src="./js/map.jsx"></script>
  <script type="text/babel" data-presets="react" src="./js/screens.jsx"></script>
  <script type="text/babel" data-presets="react" src="./js/app.jsx"></script>
</body>
</html>
