<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheelchair SLAM UI - 통합 시스템</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body {
      margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background-color: #1a1b1e; font-family: 'Pretendard', sans-serif;
    }
    #root { box-shadow: 0 24px 48px rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden; user-select: none; }
    button { outline: none; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    @keyframes actPulse {
      0%   { transform: scale(0.8); opacity: 0.7; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes arrivalIn {
      0% { transform: scale(0.85); opacity: 0; }
      60% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes arrivalRing {
      0% { transform: scale(0.7); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes obstaclePulse1 { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes obstaclePulse2 { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes obstaclePulse3 { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes obstacleShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ─── 0. ROS / 센서 / 맵 설정 ──────────────────────────────────────
    // 운영 환경에 맞게 조정하는 상수들. 코드 수정 없이 이 블록만 만지면 됨.
    const ROS_CONFIG = {
      url: 'ws://localhost:9090',  // rosbridge_websocket 주소
    };

    // 거리 임계값 (meters) — 색상 분기 기준
    const DIST_THRESHOLDS = {
      red: 0.5,     // <50cm: 빨강 (위험)
      orange: 0.8,  // 50~80cm: 주황 (주의)
      white: 1.0,   // 80~100cm: 불투명 흰색 (관심)
      // ≥1m: 표시 안 함 (안전)
    };

    // 맵 좌표 변환 — /map 토픽이 들어오면 자동으로 갱신되는 React state로 관리.
    //   토픽이 안 들어오면 아래 기본값 사용.
    const DEFAULT_MAP_CONFIG = {
      origin_x: -10.0,        // map.yaml의 origin[0]
      origin_y: -10.0,        // map.yaml의 origin[1]
      pixels_per_meter: 30,   // SVG 1m당 픽셀
      svg_width: 800,
      svg_height: 480,
    };

    // 라이다 각도 → 5방향 분류 (라이다 0rad이 정면, 반시계가 +)
    //   휠체어 정면 ±20°가 'front', 좌측 등.
    const LIDAR_SECTORS = [
      { key: 'front',      from: -20, to:  20 },
      { key: 'frontLeft',  from:  20, to:  60 },
      { key: 'left',       from:  60, to: 100 },
      { key: 'frontRight', from: -60, to: -20 },
      { key: 'right',      from: -100, to: -60 },
    ];

    // ─── 1. 블루 테마 토큰 적용 (60:30:10 비율) ────────────────────────
    const TOKENS = {
      color: {
        bg: '#F8FAFC', surface: '#FFFFFF', surfaceAlt: '#BFDBFE', surfaceDark: '#191970',
        primary: '#0047AB', primaryDark: '#002F6C', primarySoft: '#BFDBFE', accent: '#3B82F6',
        ink: '#002F6C', inkMuted: '#10367D', inkFaint: '#64748B',
        success: '#10A571', successSoft: '#D8F1E5', warn: '#E6A100', warnSoft: '#FEF08A', danger: '#E5484D', dangerSoft: '#FEE2E2',
        mapBg: '#F1F5F9', mapWall: '#002F6C', mapFloor: '#E2E8F0', mapPath: '#3B82F6', mapPathGhost: '#BFDBFE', mapObstacle: '#E5484D', mapRobot: '#191970',
        line: '#BFDBFE', lineStrong: '#3B82F6',
      },
      radius: { sm: 8, md: 14, lg: 20, xl: 28, pill: 999 },
      shadow: { sm: '0 1px 2px rgba(0,47,108,0.06)', md: '0 4px 14px rgba(0,47,108,0.1)', lg: '0 10px 30px rgba(0,47,108,0.15)' },
      font: { sans: `'Pretendard', sans-serif` },
    };

    const I18N = { ko: { hello: '안녕하세요', wheresToday: '오늘은 어디로 갈까요?', caregiver: '보호자 연결됨', search: '목적지 검색', goHome: '대기소로 자동 귀환', favorites: '즐겨찾기', myRoom: '내 병실', rehab: '재활치료실', map: '실시간 맵', sos: 'SOS', startRoute: '경로 시작', manual: '수동', auto: '자율', stop: '정지', obstacle: '장애물 감지' } };

    // ─── 2. Shared UI Components ──────────────────────────────────────
    function Icon({ name, size = 20, stroke = 1.8, color = 'currentColor', style }) {
      const paths = {
        home: <><path d="M3 10l9-7 9 7"/><path d="M5 9v11h14V9"/></>, map: <><path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></>, search: <><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></>, battery: <><rect x="3" y="7" width="16" height="10" rx="2"/><path d="M21 10v4"/><rect x="5" y="9" width="10" height="6" fill="currentColor" stroke="none" rx="1"/></>, signal: <><path d="M4 20h2M9 20h2v-4M14 20h2v-8M19 20h2V6"/></>, chevronRight: <path d="M9 6l6 6-6 6"/>, chevronLeft: <path d="M15 6l-6 6 6 6"/>, arrowRight: <><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></>, pin: <><path d="M12 22s-7-7.5-7-13a7 7 0 0114 0c0 5.5-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></>, play: <path d="M8 5v14l11-7z" fill="currentColor" stroke="none"/>, stop: <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>, sos: <><circle cx="12" cy="12" r="9"/><path d="M8 10h2v4H8zM14 10h2v4h-2zM11 10h2v4h-2z" fill="currentColor" stroke="none"/></>, bed: <><path d="M3 10V6M21 18v-5a3 3 0 00-3-3H3M3 18h18"/><circle cx="8" cy="10" r="2"/></>, alert: <><path d="M12 3l10 18H2L12 3z"/><path d="M12 10v5M12 18v.5" stroke="#fff"/></>, leaf: <><path d="M11 20A7 7 0 014 13V4h9a7 7 0 010 14z"/><path d="M11 20c-3-5-3-9 0-13"/></>
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>{paths[name]}</svg>;
    }

    function Pill({ tone = 'neutral', icon, children, size = 'md' }) {
      const C = TOKENS.color;
      const tones = { neutral: { bg: C.surfaceAlt, fg: C.inkDark }, primary: { bg: C.primarySoft, fg: C.primaryDark }, success: { bg: C.successSoft, fg: C.success }, warn: { bg: C.warnSoft, fg: '#8a6500' }, danger: { bg: C.dangerSoft, fg: C.danger } };
      const s = tones[tone] || tones.neutral;
      const pad = size === 'lg' ? '10px 16px' : size === 'sm' ? '4px 10px' : '6px 12px';
      return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: pad, borderRadius: TOKENS.radius.pill, background: s.bg, color: s.fg, fontSize: size === 'lg'?16:14, fontWeight: 700 }}>{icon && <Icon name={icon} size={16} stroke={2.2} />} {children}</span>;
    }

    function Card({ children, style, pad = 20, onClick }) {
      return <div onClick={onClick} style={{ background: TOKENS.color.surface, borderRadius: TOKENS.radius.lg, boxShadow: TOKENS.shadow.sm, border: `1px solid ${TOKENS.color.line}`, padding: pad, ...style }}>{children}</div>;
    }

    function BigButton({ children, icon, tone = 'primary', onClick, subtitle }) {
      const C = TOKENS.color;
      const t = tone === 'primary' ? { bg: C.primary, fg: '#fff' } : tone === 'soft' ? { bg: C.primarySoft, fg: C.primaryDark } : { bg: C.surface, fg: C.ink, border: `2px solid ${C.line}` };
      return (
        <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 14, background: t.bg, color: t.fg, border: t.border || 'none', borderRadius: TOKENS.radius.lg, padding: '22px 26px', fontSize: 22, fontWeight: 800, fontFamily: TOKENS.font.sans, cursor: 'pointer', width: '100%', textAlign: 'left', minHeight: 80 }} onMouseDown={e => e.currentTarget.style.transform='scale(0.98)'} onMouseUp={e => e.currentTarget.style.transform=''} onMouseLeave={e => e.currentTarget.style.transform=''}>
          {icon && <Icon name={icon} size={30} stroke={2.5} />}
          <span style={{ display: 'flex', flexDirection: 'column', gap: 3 }}><span>{children}</span>{subtitle && <span style={{ fontSize: 16, fontWeight: 600, opacity: 0.85 }}>{subtitle}</span>}</span>
        </button>
      );
    }

    function StatusBar() {
      return (
        <div style={{ height: 38, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 18px', fontSize: 14, fontWeight: 700, color: TOKENS.color.primaryDark, background: 'rgba(255,255,255,0.85)', borderBottom: `1px solid ${TOKENS.color.line}` }}>
          <span>오후 2:34</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}><Icon name="signal" size={14} /><span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="battery" size={18} /><span>78%</span></span></span>
        </div>
      );
    }

    function Frame({ children, bg }) {
      return <div style={{ width: 1024, height: 720, background: bg || TOKENS.color.bg, fontFamily: TOKENS.font.sans, color: TOKENS.color.ink, position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>{children}</div>;
    }

    // ─── 2.5 시스템 활동 로그 (Activity Log) ──────────────────────────
    const ActivityContext = React.createContext(null);

    function ActivityProvider({ children }) {
      const [activities, setActivities] = React.useState([]);
      const idRef = React.useRef(1);

      // status: 'active' | 'completed' | 'cancelled' | 'failed'
      const startActivity = React.useCallback((label, meta = {}) => {
        const id = idRef.current++;
        setActivities(prev => [{ id, label, status: 'active', startedAt: new Date(), endedAt: null, ...meta }, ...prev].slice(0, 50));
        return id;
      }, []);

      const updateActivity = React.useCallback((id, patch) => {
        setActivities(prev => prev.map(a => a.id === id
          ? { ...a, ...patch, endedAt: patch.status && patch.status !== 'active' ? new Date() : a.endedAt }
          : a));
      }, []);

      const completeActivity = React.useCallback((id, note) => updateActivity(id, { status: 'completed', note }), [updateActivity]);
      const cancelActivity   = React.useCallback((id, note) => updateActivity(id, { status: 'cancelled', note: note || '사용자 취소' }), [updateActivity]);
      const failActivity     = React.useCallback((id, note) => updateActivity(id, { status: 'failed', note }), [updateActivity]);

      const logEvent = React.useCallback((label, meta = {}) => {
        const id = idRef.current++;
        const now = new Date();
        setActivities(prev => [{ id, label, status: 'completed', startedAt: now, endedAt: now, ...meta }, ...prev].slice(0, 50));
        return id;
      }, []);

      const cancelAllActive = React.useCallback((note) => {
        setActivities(prev => prev.map(a => a.status === 'active'
          ? { ...a, status: 'cancelled', note: note || '사용자 취소', endedAt: new Date() }
          : a));
      }, []);

      const clearAll = React.useCallback(() => setActivities([]), []);

      const value = { activities, startActivity, updateActivity, completeActivity, cancelActivity, failActivity, logEvent, cancelAllActive, clearAll };
      return <ActivityContext.Provider value={value}>{children}</ActivityContext.Provider>;
    }

    const useActivity = () => React.useContext(ActivityContext);

    function fmtTime(d) {
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      const s = String(d.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }
    function fmtDuration(start, end) {
      const ms = (end || new Date()) - start;
      if (ms < 1000) return `${ms}ms`;
      const s = Math.floor(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      return `${m}m ${s % 60}s`;
    }

    function StatusDot({ status }) {
      const C = TOKENS.color;
      const map = {
        active:    { bg: C.accent,   ring: 'rgba(59,130,246,0.25)', pulse: true },
        completed: { bg: C.success,  ring: 'rgba(16,165,113,0.18)', pulse: false },
        cancelled: { bg: C.inkFaint, ring: 'rgba(100,116,139,0.18)', pulse: false },
        failed:    { bg: C.danger,   ring: 'rgba(229,72,77,0.2)',   pulse: false },
      };
      const s = map[status] || map.completed;
      return (
        <span style={{ position: 'relative', width: 10, height: 10, display: 'inline-block', flexShrink: 0 }}>
          {s.pulse && <span style={{ position: 'absolute', inset: -6, borderRadius: '50%', background: s.ring, animation: 'actPulse 1.4s ease-out infinite' }} />}
          <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: s.bg, boxShadow: `0 0 0 3px ${s.ring}` }} />
        </span>
      );
    }

    const STATUS_LABEL = {
      active:    { ko: '진행 중' },
      completed: { ko: '완료' },
      cancelled: { ko: '취소됨' },
      failed:    { ko: '실패' },
    };

    function ActivityRow({ entry, onCancel, now }) {
      const C = TOKENS.color;
      const isActive = entry.status === 'active';
      const isCancelled = entry.status === 'cancelled';
      const isFailed = entry.status === 'failed';
      const borderColor = isActive ? C.accent : isCancelled ? C.inkFaint : isFailed ? C.danger : C.success;
      const pillBg = isActive ? C.primarySoft : isCancelled ? '#E2E8F0' : isFailed ? C.dangerSoft : C.successSoft;
      const pillFg = isActive ? C.primaryDark : isCancelled ? C.inkFaint : isFailed ? C.danger : '#0a6b4a';
      return (
        <div style={{
          display: 'flex', gap: 12, padding: '12px 14px',
          background: isActive ? 'rgba(59,130,246,0.06)' : C.surface,
          borderLeft: `3px solid ${borderColor}`,
          borderRadius: 10,
          opacity: isCancelled ? 0.78 : 1,
        }}>
          <div style={{ paddingTop: 5 }}><StatusDot status={entry.status} /></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, alignItems: 'baseline' }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: C.primaryDark, textDecoration: isCancelled ? 'line-through' : 'none' }}>{entry.label}</div>
              <div style={{ fontSize: 11, color: C.inkFaint, fontWeight: 700, fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>{fmtTime(entry.startedAt)}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 11, fontWeight: 800, padding: '2px 8px', borderRadius: 999, background: pillBg, color: pillFg }}>{STATUS_LABEL[entry.status].ko}</span>
              <span style={{ fontSize: 11, color: C.inkFaint, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>
                {isActive ? `+${fmtDuration(entry.startedAt, now)}` : fmtDuration(entry.startedAt, entry.endedAt)}
              </span>
              {entry.note && !isActive && (
                <span style={{ fontSize: 11, color: C.inkFaint, fontWeight: 600 }}>· {entry.note}</span>
              )}
              {isActive && onCancel && (
                <button onClick={() => onCancel(entry.id)} style={{
                  marginLeft: 'auto', padding: '3px 10px', fontSize: 11, fontWeight: 800,
                  background: C.surface, color: C.danger, border: `1.5px solid ${C.dangerSoft}`,
                  borderRadius: 999, cursor: 'pointer', fontFamily: 'inherit',
                }}>취소</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── 2.6 확인 다이얼로그 ──────────────────────────────────────────
    function ConfirmDialog({ open, title, message, confirmText = '확인', cancelText = '취소', tone = 'primary', onConfirm, onCancel }) {
      if (!open) return null;
      const C = TOKENS.color;
      const confirmBg = tone === 'danger' ? C.danger : C.primary;
      return (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 100,
          background: 'rgba(0,47,108,0.45)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          backdropFilter: 'blur(4px)', fontFamily: TOKENS.font.sans,
        }}>
          <div style={{
            width: 460, background: C.surface, borderRadius: 24,
            boxShadow: '0 24px 64px rgba(0,47,108,0.35)',
            padding: 32, display: 'flex', flexDirection: 'column', gap: 16,
          }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.primaryDark, letterSpacing: -0.3 }}>{title}</div>
            <div style={{ fontSize: 17, color: C.inkMuted, fontWeight: 600, lineHeight: 1.5 }}>{message}</div>
            <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
              <button onClick={onCancel} style={{
                flex: 1, padding: '18px', borderRadius: 16, border: `2px solid ${C.line}`,
                background: C.surface, color: C.primaryDark, fontSize: 18, fontWeight: 800,
                cursor: 'pointer', fontFamily: 'inherit',
              }}>{cancelText}</button>
              <button onClick={onConfirm} style={{
                flex: 1.3, padding: '18px', borderRadius: 16, border: 'none',
                background: confirmBg, color: '#fff', fontSize: 18, fontWeight: 800,
                cursor: 'pointer', fontFamily: 'inherit',
                boxShadow: tone === 'danger' ? '0 8px 16px rgba(229,72,77,0.25)' : '0 8px 16px rgba(0,71,171,0.25)',
              }}>{confirmText}</button>
            </div>
          </div>
        </div>
      );
    }

    function ActivityPanel({ onStop }) {
      const C = TOKENS.color;
      const ctx = useActivity();
      const [open, setOpen] = React.useState(false);
      const [filter, setFilter] = React.useState('all');
      const [now, setNow] = React.useState(Date.now());

      const hasActive = ctx.activities.some(a => a.status === 'active');
      React.useEffect(() => {
        if (!hasActive) return;
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, [hasActive]);

      const counts = React.useMemo(() => {
        const c = { all: ctx.activities.length, active: 0, completed: 0, cancelled: 0, failed: 0 };
        ctx.activities.forEach(a => { c[a.status] = (c[a.status] || 0) + 1; });
        return c;
      }, [ctx.activities]);

      const visible = ctx.activities.filter(a => filter === 'all' ? true : a.status === filter);

      // 현재 상태 한 줄: 가장 최근 active 항목, 없으면 가장 최근 항목
      const currentEntry = ctx.activities.find(a => a.status === 'active') || ctx.activities[0];
      const statusText = currentEntry
        ? (currentEntry.status === 'active'
            ? `${currentEntry.label}  ·  +${fmtDuration(currentEntry.startedAt, now)}`
            : `${currentEntry.label}  ·  ${STATUS_LABEL[currentEntry.status].ko}`)
        : '대기 중';

      const TabBtn = ({ k, label }) => (
        <button onClick={() => setFilter(k)} style={{
          padding: '6px 11px', fontSize: 12, fontWeight: 800,
          background: filter === k ? C.primary : 'transparent',
          color: filter === k ? '#fff' : C.inkMuted,
          border: 'none', borderRadius: 999, cursor: 'pointer', fontFamily: 'inherit',
          display: 'flex', alignItems: 'center', gap: 5,
        }}>
          {label}
          <span style={{
            fontSize: 10.5, fontWeight: 800, padding: '1px 6px', borderRadius: 999,
            background: filter === k ? 'rgba(255,255,255,0.25)' : '#E2E8F0',
            color: filter === k ? '#fff' : C.inkMuted,
            fontVariantNumeric: 'tabular-nums', minWidth: 16, textAlign: 'center',
          }}>{counts[k] || 0}</span>
        </button>
      );

      // 미니마이즈 모드: 화면 하단 좌측 한 줄, 우측에 노출되는 정지·홈·기타 버튼 가리지 않도록 좌측 정렬
      if (!open) {
        return (
          <div style={{
            position: 'absolute', right: 16, top: 50, zIndex: 60,
            maxWidth: 360,
            background: 'rgba(255,255,255,0.97)',
            backdropFilter: 'blur(8px)',
            border: `1px solid ${C.line}`,
            borderRadius: 999,
            boxShadow: '0 8px 24px rgba(0,47,108,0.18)',
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '8px 14px 8px 12px',
            fontFamily: TOKENS.font.sans,
            cursor: 'pointer',
          }} onClick={() => setOpen(true)}>
            <span style={{ position: 'relative', width: 10, height: 10, flexShrink: 0 }}>
              <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: hasActive ? C.accent : C.success }} />
              {hasActive && <span style={{ position: 'absolute', inset: -4, borderRadius: '50%', background: 'rgba(59,130,246,0.3)', animation: 'actPulse 1.4s ease-out infinite' }} />}
            </span>
            <span style={{
              fontSize: 13, fontWeight: 800,
              color: hasActive ? C.primaryDark : C.inkMuted,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              fontVariantNumeric: 'tabular-nums',
            }}>
              {statusText}
            </span>
            <span style={{

    // ─── 3. Map Component ─────────────────────────────────────────────
    // world 좌표(meters)를 SVG 픽셀로 변환. AMCL/odom의 (x, y, yaw)를 직접 받음.
    function worldToScreen(wx, wy, mapConfig) {
      const px = (wx - mapConfig.origin_x) * mapConfig.pixels_per_meter;
      // ROS는 y+가 위, SVG는 y+가 아래라 뒤집기
      const py = mapConfig.svg_height - (wy - mapConfig.origin_y) * mapConfig.pixels_per_meter;
      return { x: px, y: py };
    }

    function SlamMap({
      width = 800, height = 480,
      showPath = true, showRobot = true,
      // robotWorld: { x, y, yaw } in meters/radians (AMCL pose)
      // null이면 기본 위치 표시
      robotWorld = null,
      mapConfig = DEFAULT_MAP_CONFIG,
      pathProgress = 0.35,
      showObstacles = false,
      destination = null,
    }) {
      const C = TOKENS.color;
      const pathD = 'M 180 380 L 180 240 L 400 240 L 560 240 L 680 240 L 680 150', pathLength = 720;

      // world 좌표 → 화면 픽셀 변환
      const robotScreen = robotWorld
        ? worldToScreen(robotWorld.x, robotWorld.y, mapConfig)
        : { x: 180, y: 380 };
      // ROS yaw: 반시계가 +. SVG rotate는 시계방향이 +. 그리고 y축 뒤집힘 보정.
      const headingDeg = robotWorld
        ? -(robotWorld.yaw * 180 / Math.PI)
        : 0;

      return (
        <svg viewBox="0 0 800 480" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style={{ display: 'block', background: C.mapBg }}>
          <rect x="0" y="0" width="800" height="480" fill={C.mapFloor} opacity="0.3" />
          <path d="M40 40 L 760 40 L 760 440 L 40 440 Z M40 140 L 720 140 M40 340 L 720 340 M150 40 L 150 140 M300 40 L 300 140 M450 40 L 450 140 M620 40 L 620 140" fill="none" stroke={C.mapWall} strokeWidth="2.5" strokeLinecap="round" />
          <rect x="360" y="215" width="80" height="50" fill={C.primarySoft} stroke={C.primary} strokeWidth="2" />
          <text x="400" y="243" textAnchor="middle" fontSize="12" fill={C.primaryDark} fontWeight="800">간호스테이션</text>

          {showPath && <><path d={pathD} fill="none" stroke={C.mapPathGhost} strokeWidth="6" strokeDasharray="2 10" /><path d={pathD} fill="none" stroke={C.mapPath} strokeWidth="5.5" strokeDasharray={pathLength} strokeDashoffset={pathLength * (1 - pathProgress)} /></>}
          {destination && <g transform={`translate(${destination.x}, ${destination.y})`}><circle r="14" fill={C.accent} opacity="0.2"/><circle r="8" fill={C.accent} /></g>}
          {showObstacles && <g transform="translate(560, 240)"><circle r="16" fill={C.danger} opacity="0.3"/><circle r="8" fill={C.danger} /></g>}
          {showRobot && (
            <g transform={`translate(${robotScreen.x}, ${robotScreen.y}) rotate(${headingDeg})`} style={{ transition: 'transform 0.15s linear' }}>
              {/* 라이브 위치 펄스 (RViz 느낌) */}
              <circle r="28" fill={C.primary} opacity="0.12">
                <animate attributeName="r" values="22;32;22" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.18;0.06;0.18" dur="2s" repeatCount="indefinite" />
              </circle>
              <circle r="20" fill={C.surface} opacity="0.9" />
              <circle r="16" fill={C.mapRobot} />
              <path d="M 0 -14 L 6 -2 L -6 -2 Z" fill={C.surface} />
            </g>
          )}
        </svg>
      );
    }

    // ─── 3.5 도착 모달 & 장애물 근접 표시 ───────────────────────────────
    function ArrivalModal({ open, label, onDismiss }) {

          setRemaining(left);
          if (left <= 0) { clearInterval(tick); onDismiss(); }

      }, [open, onDismiss]);
      if (!open) return null;
      const C = TOKENS.color;
      return (
        <div onClick={onDismiss} style={{

    // 자동차 후방 주차 센서 스타일: 방향별로 빨강/주황/노랑 바가 점등
    // 거리(m) → 시각화 정보. 임계값 기반.
    // null/Infinity/>= 1m 이면 inactive (회색, 흐릿)
    function distToVisual(d) {
      if (d == null || !isFinite(d) || d >= DIST_THRESHOLDS.white) {
        return { active: false, color: '#1E293B', opacity: 0.18, level: 0 };
      }
      if (d < DIST_THRESHOLDS.red) {
        return { active: true, color: '#E5484D', opacity: 1, level: 3 };       // 빨강
      }
      if (d < DIST_THRESHOLDS.orange) {
        return { active: true, color: '#F97316', opacity: 1, level: 2 };       // 주황
      }
      // 0.8 ≤ d < 1.0
      return { active: true, color: '#F8FAFC', opacity: 0.95, level: 1 };      // 불투명 흰색
    }

    function ObstacleProximity({ distances }) {
      // distances: { front, frontLeft, frontRight, left, right }  단위: meters
      // 각 방향이 null 또는 Infinity면 안전한 것으로 간주
      const dists = distances || {};
      const dirs = ['left', 'frontLeft', 'front', 'frontRight', 'right'];

      // 각 방향별 시각화 계산
      const visuals = {};
      let maxLevel = 0;
      let nearestKey = null;
      let nearestDist = Infinity;
      dirs.forEach(k => {
        const v = distToVisual(dists[k]);
        visuals[k] = v;
        if (v.level > maxLevel) maxLevel = v.level;
        const d = dists[k];
        if (d != null && isFinite(d) && d < nearestDist) {
          nearestDist = d;
          nearestKey = k;
        }
      });

      const active = maxLevel > 0;
      const dirLabel = { front: '전방', frontLeft: '좌전방', frontRight: '우전방', left: '좌측', right: '우측' };
      const dirColor = maxLevel >= 3 ? '#E5484D' : maxLevel === 2 ? '#F97316' : '#F8FAFC';

      // SVG wedge: 휠체어 중심 5방향 부채꼴.
      //   ring 1(원거리, 80~100cm), ring 2(50~80cm), ring 3(<50cm)
      //   해당 방향 거리값이 ring 임계값 안쪽이면 그 ring이 점등됨
      const Wedge = ({ key_, startAngle, endAngle, ring }) => {
        const cx = 90, cy = 110;
        const radii = { 1: [78, 92], 2: [60, 76], 3: [42, 58] };
        const [r1, r2] = radii[ring];
        const toRad = (d) => (d - 90) * Math.PI / 180;
        const p1 = { x: cx + r2 * Math.cos(toRad(startAngle)), y: cy + r2 * Math.sin(toRad(startAngle)) };
        const p2 = { x: cx + r2 * Math.cos(toRad(endAngle)),   y: cy + r2 * Math.sin(toRad(endAngle)) };
        const p3 = { x: cx + r1 * Math.cos(toRad(endAngle)),   y: cy + r1 * Math.sin(toRad(endAngle)) };
        const p4 = { x: cx + r1 * Math.cos(toRad(startAngle)), y: cy + r1 * Math.sin(toRad(startAngle)) };
        const largeArc = endAngle - startAngle > 180 ? 1 : 0;
        const path = `M${p1.x},${p1.y} A${r2},${r2} 0 ${largeArc} 1 ${p2.x},${p2.y} L${p3.x},${p3.y} A${r1},${r1} 0 ${largeArc} 0 ${p4.x},${p4.y} Z`;

        const v = visuals[key_];
        const lit = v.active && v.level >= ring;
        // ring 1=흰, 2=주황, 3=빨강
        const ringColor = ring === 3 ? '#E5484D' : ring === 2 ? '#F97316' : '#F8FAFC';
        return (
          <path
            d={path}
            fill={lit ? ringColor : '#1E293B'}
            opacity={lit ? (ring === 1 ? 0.85 : 1) : 0.18}
            style={lit && ring >= 2 ? { animation: `obstaclePulse${ring} ${1 - ring * 0.2}s ease-in-out infinite` } : undefined}
          />
        );
      };

      return (
        <div style={{
          position: 'absolute', left: 16, bottom: 16, zIndex: 8,
          background: 'rgba(15,23,42,0.92)', backdropFilter: 'blur(6px)',
          padding: 14, borderRadius: 20,
          border: `1px solid ${active ? dirColor : 'rgba(148,163,184,0.25)'}`,
          boxShadow: active && maxLevel >= 3 ? `0 0 24px ${dirColor}88, 0 8px 24px rgba(0,0,0,0.3)` : '0 8px 24px rgba(0,0,0,0.25)',
          transition: 'border-color 0.3s, box-shadow 0.3s',
          fontFamily: TOKENS.font.sans,
          width: 220,
          animation: active && maxLevel >= 3 ? 'obstacleShake 0.4s ease-in-out infinite' : undefined,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 800, color: '#94A3B8', letterSpacing: 1.5 }}>주변 장애물</span>
            <span style={{ fontSize: 10, fontWeight: 700, color: active ? dirColor : '#64748B', padding: '2px 8px', borderRadius: 999, background: active ? `${dirColor}22` : 'rgba(148,163,184,0.12)' }}>
              {active ? '감지됨' : '안전'}
            </span>
          </div>
          <svg viewBox="0 0 180 140" width="100%" height="124" style={{ display: 'block' }}>
            {[3, 2, 1].map(ring => (
              <React.Fragment key={ring}>
                <Wedge key_="left"        startAngle={-100} endAngle={-60} ring={ring} />
                <Wedge key_="frontLeft"   startAngle={-60}  endAngle={-20} ring={ring} />
                <Wedge key_="front"       startAngle={-20}  endAngle={20}  ring={ring} />
                <Wedge key_="frontRight"  startAngle={20}   endAngle={60}  ring={ring} />
                <Wedge key_="right"       startAngle={60}   endAngle={100} ring={ring} />
              </React.Fragment>
            ))}
            {/* 휠체어 아이콘 (중심) */}
            <circle cx="90" cy="110" r="14" fill="#F8FAFC" stroke="#3B82F6" strokeWidth="2" />
            <path d="M84,108 L96,108 M85,113 L95,113" stroke="#3B82F6" strokeWidth="2" strokeLinecap="round" />
          </svg>
          <div style={{ marginTop: 4, display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 13, fontWeight: 800, color: active ? dirColor : '#64748B' }}>
              {active ? `${dirLabel[nearestKey] || ''} 접근` : '주변 양호'}
            </span>
            {active && isFinite(nearestDist) && (
              <span style={{ fontSize: 14, fontWeight: 800, color: '#F8FAFC', fontVariantNumeric: 'tabular-nums' }}>
                {nearestDist.toFixed(2)}m
              </span>
            )}
          </div>
        </div>
      );
    }

    function JoystickScreen({ t, robotWorld, mapConfig, onBack, onGoHome, setMode, cmdVelPub }) {
      const C = TOKENS.color;
      const [activeBtn, setActiveBtn] = React.useState(null);
      const intervalRef = React.useRef(null);

      // 설정 속도
      const SPEED_LINEAR = 0.3; // m/s
      const SPEED_ANGULAR = 0.5; // rad/s

      const publishCmd = (dir) => {
        if (!cmdVelPub) return;
        let twist = new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular: {x:0, y:0, z:0} });
        if (dir === 'fwd') twist.linear.x = SPEED_LINEAR;
        if (dir === 'rev') twist.linear.x = -SPEED_LINEAR;
        if (dir === 'left') twist.angular.z = SPEED_ANGULAR;
        if (dir === 'right') twist.angular.z = -SPEED_ANGULAR;
        cmdVelPub.publish(twist);
      };

      const startMove = (dir) => {
        setActiveBtn(dir);
        publishCmd(dir); // 첫 발송
        // 누르고 있는 동안 파이썬 timeout(0.5s)에 걸리지 않게 0.1초마다 반복 전송
        if (intervalRef.current) clearInterval(intervalRef.current);
        intervalRef.current = setInterval(() => publishCmd(dir), 100);
      };

      const stopMove = () => {
        setActiveBtn(null);
        if (intervalRef.current) clearInterval(intervalRef.current);
        if (cmdVelPub) {
          cmdVelPub.publish(new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular: {x:0, y:0, z:0} }));
        }
      };

      const bindEvents = (dir) => ({
        onMouseDown: () => startMove(dir), onMouseUp: stopMove, onMouseLeave: stopMove,
        onTouchStart: (e) => { e.preventDefault(); startMove(dir); }, onTouchEnd: (e) => { e.preventDefault(); stopMove(); },

    // ─── 6. Main App Component (Router & ROS Connect) ─────────────────
    // 목적지 라벨 매핑 (활동 로그 표시용)
    const DEST_LABELS = {
      emergency: '응급실(Emergency)',
      room_101: '101호',
      room_102: '102호',
      home: '대기소',
    };

    function AppInner() {
      // 화면 스택: ['home'] -> ['home', 'search'] -> ['home', 'search', 'nav']
      const [stack, setStack] = React.useState(['home']);
      const [mode, setMode] = React.useState('manual');
      const [rosTopics, setRosTopics] = React.useState(null);
      const [rosConnected, setRosConnected] = React.useState(false);
      const [confirm, setConfirm] = React.useState(null); // {title, message, tone, onConfirm}

      const t = I18N['ko'];
      const act = useActivity();
      const actRef = React.useRef(act);
      actRef.current = act;
      const currentScreen = stack[stack.length - 1];

      const navTaskRef = React.useRef(null);
      const [activeDest, setActiveDest] = React.useState(null); // {key, label}
      const [arrival, setArrival] = React.useState(null); // {label} when arrived
      const arrivalTimerRef = React.useRef(null);

      // 실시간 센서 데이터 (실제 ROS 토픽에서 갱신)
      // distances: 5방향 최소 거리(m). null이면 안전(>1m)으로 간주
      const [distances, setDistances] = React.useState({
        front: null, frontLeft: null, frontRight: null, left: null, right: null,
      });
      // 로봇 위치 (AMCL pose 또는 odom). null이면 SlamMap이 기본 위치 표시.
      const [robotWorld, setRobotWorld] = React.useState(null);
      // 맵 정보 (origin, resolution) - /map 토픽에서 자동 추출
      const [mapConfig, setMapConfig] = React.useState(DEFAULT_MAP_CONFIG);
      // 안전 알림 (전방 장애물 진입 시 safety_stop_node가 발행)
      const [safetyAlert, setSafetyAlert] = React.useState(null); // 'obstacle_too_close' | 'obstacle_cleared' | 'keepout_violation'

      // 5방향 거리값 누적 캐시 — 라이다·초음파 콜백이 각자 갱신
      const lidarSectorRef = React.useRef({ front: null, frontLeft: null, frontRight: null, left: null, right: null });
      const ultraRef = React.useRef({ front: null, left: null, right: null });

      // 도착 알림 시뮬레이션 (자율 주행 시작 후 자동으로 도착)
      const scheduleArrival = (label, delayMs = 14000) => {
        if (arrivalTimerRef.current) clearTimeout(arrivalTimerRef.current);
        arrivalTimerRef.current = setTimeout(() => {
          if (navTaskRef.current != null) {
            actRef.current.completeActivity(navTaskRef.current, '목적지 도착');
            navTaskRef.current = null;
          }
          setArrival({ label });
        }, delayMs);
      };
      const cancelArrival = () => { if (arrivalTimerRef.current) { clearTimeout(arrivalTimerRef.current); arrivalTimerRef.current = null; } };

      React.useEffect(() => () => { cancelArrival(); }, []);

      // safety_alert 자동 처리: 자율 주행 중 위험 진입 시 알림 화면으로
      React.useEffect(() => {
        if (safetyAlert === 'obstacle_too_close') {
          // 자율 주행 화면일 때만 자동 전환 (다른 화면이면 로그만)
          if (currentScreen === 'nav') {
            cancelArrival();
            setStack(prev => [...prev, 'alert']);
          }
        }
        // 알림 처리 후 비우기 (재발생 시 다시 트리거되도록)
        if (safetyAlert) {
          const t = setTimeout(() => setSafetyAlert(null), 100);
          return () => clearTimeout(t);
        }
      }, [safetyAlert]);

      // ===== 5방향 거리 통합 (라이다 + 초음파) =====
      // 라이다 sector별 최소거리 + 초음파 좌/중/우를 결합. 더 가까운 값을 사용.
      const recomputeDistances = () => {
        const merged = { ...lidarSectorRef.current };
        // 초음파는 정확하지만 정면(좁은 빔) 위주. 라이다보다 가까우면 우선.
        const u = ultraRef.current;
        const tighter = (a, b) => {
          if (a == null) return b;
          if (b == null) return a;
          return Math.min(a, b);
        };
        merged.front = tighter(merged.front, u.front);
        merged.left  = tighter(merged.left,  u.left);
        merged.right = tighter(merged.right, u.right);
        setDistances(merged);
      };

      React.useEffect(() => {
        const connectId = actRef.current.startActivity('로봇 연결 시도');
        const ros = new ROSLIB.Ros({ url: ROS_CONFIG.url });
        ros.on('connection', () => { setRosConnected(true); actRef.current.completeActivity(connectId, '연결 완료'); });
        ros.on('error', () => { setRosConnected(false); actRef.current.failActivity(connectId, 'UI 테스트 모드'); });
        ros.on('close', () => setRosConnected(false));

        // ===== Publisher =====
        const destPub = new ROSLIB.Topic({ ros, name: '/destination', messageType: 'std_msgs/String' });
        const modeSwitchPub = new ROSLIB.Topic({ ros, name: '/mode_switch', messageType: 'std_msgs/String' });
        const cmdVelPub = new ROSLIB.Topic({ ros, name: '/cmd_vel_teleop', messageType: 'geometry_msgs/Twist' });

        // ===== Subscriber =====
        const modeSub = new ROSLIB.Topic({ ros, name: '/robot_mode', messageType: 'std_msgs/String' });
        modeSub.subscribe((msg) => {
          setMode(msg.data);
          actRef.current.logEvent(`주행 모드 전환: ${msg.data === 'auto' ? '자율' : '수동'}`);
        });

        // --- 라이다 /scan: 5방향 sector 최소 거리 계산 ---
        const scanSub = new ROSLIB.Topic({
          ros, name: '/scan', messageType: 'sensor_msgs/LaserScan',
          throttle_rate: 100,  // 10Hz로 제한 (UI 부하 감소)
          queue_length: 1,
        });
        scanSub.subscribe((msg) => {
          const { angle_min, angle_increment, ranges, range_min, range_max } = msg;
          const sectors = { front: Infinity, frontLeft: Infinity, frontRight: Infinity, left: Infinity, right: Infinity };
          for (let i = 0; i < ranges.length; i++) {
            const r = ranges[i];
            if (!isFinite(r) || r < range_min || r > range_max) continue;
            const angDeg = (angle_min + i * angle_increment) * 180 / Math.PI;
            // [-180, 180]로 정규화
            let a = angDeg;
            while (a > 180) a -= 360;
            while (a < -180) a += 360;
            for (const sec of LIDAR_SECTORS) {
              if (a >= sec.from && a <= sec.to) {
                if (r < sectors[sec.key]) sectors[sec.key] = r;
                break;
              }
            }
          }
          // Infinity → null로 변환
          const out = {};
          for (const k in sectors) out[k] = isFinite(sectors[k]) ? sectors[k] : null;
          lidarSectorRef.current = out;
          recomputeDistances();
        });

        // --- 초음파 3개 ---
        const ultraFrontSub = new ROSLIB.Topic({ ros, name: '/ultrasonic/range', messageType: 'sensor_msgs/Range', throttle_rate: 100, queue_length: 1 });
        const ultraLeftSub  = new ROSLIB.Topic({ ros, name: '/ultrasonic/left',  messageType: 'sensor_msgs/Range', throttle_rate: 100, queue_length: 1 });
        const ultraRightSub = new ROSLIB.Topic({ ros, name: '/ultrasonic/right', messageType: 'sensor_msgs/Range', throttle_rate: 100, queue_length: 1 });
        ultraFrontSub.subscribe((msg) => { ultraRef.current.front = (msg.range > 0 && isFinite(msg.range)) ? msg.range : null; recomputeDistances(); });
        ultraLeftSub.subscribe((msg)  => { ultraRef.current.left  = (msg.range > 0 && isFinite(msg.range)) ? msg.range : null; recomputeDistances(); });
        ultraRightSub.subscribe((msg) => { ultraRef.current.right = (msg.range > 0 && isFinite(msg.range)) ? msg.range : null; recomputeDistances(); });

        // --- AMCL pose: 로봇 실제 위치 (Nav2 사용 시) ---
        const amclSub = new ROSLIB.Topic({
          ros, name: '/amcl_pose', messageType: 'geometry_msgs/PoseWithCovarianceStamped',
          throttle_rate: 100, queue_length: 1,
        });
        amclSub.subscribe((msg) => {
          const p = msg.pose.pose;
          // quaternion → yaw
          const q = p.orientation;
          const yaw = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z));
          setRobotWorld({ x: p.position.x, y: p.position.y, yaw });
        });

        // --- 백업: /odom (AMCL이 없을 때) ---
        const odomSub = new ROSLIB.Topic({
          ros, name: '/odometry/filtered', messageType: 'nav_msgs/Odometry',
          throttle_rate: 200, queue_length: 1,
        });
        odomSub.subscribe((msg) => {
          // AMCL이 한 번이라도 와있으면 odom으로 덮어쓰지 않음
          // (AMCL이 더 정확한 map 좌표계)
          setRobotWorld(prev => {
            if (prev) return prev;  // AMCL이 있으면 유지
            const p = msg.pose.pose;
            const q = p.orientation;
            const yaw = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z));
            return { x: p.position.x, y: p.position.y, yaw };
          });
        });

        // --- /map: origin/resolution 자동 추출 (TRANSIENT_LOCAL latched topic) ---
        // 한 번 받으면 MAP_CONFIG를 자동 갱신 → 사용자가 yaml 안 봐도 됨
        const mapSub = new ROSLIB.Topic({
          ros, name: '/map', messageType: 'nav_msgs/OccupancyGrid',
          // latched 토픽이라 구독 즉시 한 번 발행됨
          queue_length: 1,
        });
        mapSub.subscribe((msg) => {
          const info = msg.info;
          // 맵 전체 픽셀 너비를 SVG 너비에 맞추는 pixels_per_meter 자동 계산
          const mapWidthMeters = info.width * info.resolution;
          const mapHeightMeters = info.height * info.resolution;
          // 가로/세로 중 큰 쪽이 SVG에 꽉 차도록
          const ppm = Math.min(
            DEFAULT_MAP_CONFIG.svg_width / mapWidthMeters,
            DEFAULT_MAP_CONFIG.svg_height / mapHeightMeters
          );
          setMapConfig({
            ...DEFAULT_MAP_CONFIG,
            origin_x: info.origin.position.x,
            origin_y: info.origin.position.y,
            pixels_per_meter: ppm,
          });
          actRef.current.logEvent(
            `맵 정보 자동 적용: ${info.width}×${info.height}px, ${info.resolution.toFixed(3)}m/px`
          );
          // 한 번 받으면 충분, 구독 해제
          mapSub.unsubscribe();
        });

        // --- 안전 알림 (safety_stop_node) ---
        const safetyAlertSub = new ROSLIB.Topic({ ros, name: '/safety_alert', messageType: 'std_msgs/String' });
        safetyAlertSub.subscribe((msg) => {
          setSafetyAlert(msg.data);
          if (msg.data === 'obstacle_too_close') {
            actRef.current.logEvent('⚠️ 전방 장애물 감지 - 자율 주행 중단');
          } else if (msg.data === 'obstacle_cleared') {
            actRef.current.logEvent('✅ 장애물 해소');
          } else if (msg.data === 'keepout_violation') {
            actRef.current.logEvent('🚫 금지구역 진입');
          }
        });

        setRosTopics({ destPub, modeSwitchPub, cmdVelPub });
        return () => {
          modeSub.unsubscribe();
          scanSub.unsubscribe();
          ultraFrontSub.unsubscribe();
          ultraLeftSub.unsubscribe();
          ultraRightSub.unsubscribe();
          amclSub.unsubscribe();
          odomSub.unsubscribe();
          safetyAlertSub.unsubscribe();
          ros.close();
        };
      }, []);

      // 화면 전환 helpers
      const pushScreen = (s) => setStack(prev => [...prev, s]);
      const popScreen = () => setStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
      const goHomeAll = () => {
        if (navTaskRef.current != null) {
          act.cancelActivity(navTaskRef.current, '홈으로 복귀');
          navTaskRef.current = null;
        }
        cancelArrival(); setActiveDest(null);
        setStack(['home']);
      };

      const goSearch = () => pushScreen('search');

      // 목적지 / 대기소 확인 다이얼로그
      const askStartNavigation = (destName) => {
        const label = DEST_LABELS[destName] || destName;
        setConfirm({
          title: `${label}(으)로 이동할까요?`,
          message: '확인을 누르면 휠체어가 즉시 자율 주행을 시작합니다.',
          confirmText: '네, 이동합니다',
          cancelText: '아니오',
          tone: 'primary',
          onConfirm: () => {
            setConfirm(null);
            doStartNavigation(destName);
          },
        });
      };

      const askGoHomeBase = () => {
        setConfirm({
          title: '대기소로 자동 귀환할까요?',
          message: '확인을 누르면 휠체어가 대기소까지 자율 주행으로 돌아갑니다.',
          confirmText: '네, 귀환합니다',
          cancelText: '아니오',
          tone: 'primary',
          onConfirm: () => {
            setConfirm(null);
            doGoHomeBase();
          },
        });
      };

      const doStartNavigation = (destName) => {
        if (navTaskRef.current != null) act.cancelActivity(navTaskRef.current, '새 목적지 지정');
        const label = DEST_LABELS[destName] || destName;
        const id = act.startActivity(`자율 주행: ${label}`);
        navTaskRef.current = id;
        setActiveDest({ key: destName, label });
        setMode('auto');
        if (rosTopics) rosTopics.destPub.publish(new ROSLIB.Message({ data: destName }));
        pushScreen('nav');
        scheduleArrival(label, 14000);

      };

      const doGoHomeBase = () => {
        if (navTaskRef.current != null) act.cancelActivity(navTaskRef.current, '대기소 귀환으로 변경');
        const id = act.startActivity('대기소 자동 귀환');
        navTaskRef.current = id;
        setActiveDest({ key: 'home_base', label: '대기소' });
        setMode('auto');
        if (rosTopics) rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'home' }));
        pushScreen('nav');
        scheduleArrival('대기소', 14000);

      };

      // 네비게이션 화면에서 정지 (긴급 아님)
      const stopNavigation = () => {
        if (navTaskRef.current != null) {
          act.cancelActivity(navTaskRef.current, '사용자 정지');
          navTaskRef.current = null;
        }
        cancelArrival();
        act.logEvent('주행 정지');
        if (rosTopics) rosTopics.cmdVelPub.publish(new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular: {x:0, y:0, z:0} }));
        pushScreen('alert');
      };

      // 홈 화면의 SOS = 진짜 긴급 정지
      const triggerSOS = () => {
        setConfirm({
          title: 'SOS 호출을 보낼까요?',
          message: '보호자와 관제실에 즉시 알림이 전달됩니다.',
          confirmText: '네, 호출합니다',
          cancelText: '아니오',
          tone: 'danger',
          onConfirm: () => {
            setConfirm(null);
            if (navTaskRef.current != null) {
              act.cancelActivity(navTaskRef.current, '긴급 정지');
              navTaskRef.current = null;
            }
            cancelArrival();
            act.cancelAllActive('긴급 정지');
            act.logEvent('🛑 SOS 긴급 호출');
            if (rosTopics) rosTopics.cmdVelPub.publish(new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular: {x:0, y:0, z:0} }));
            pushScreen('alert');
          },
        });
      };

      const resumeNav = () => {
        const id = act.startActivity('자율 주행 재개 (우회 경로)');
        navTaskRef.current = id;
        setMode('auto');
        if (activeDest) { scheduleArrival(activeDest.label, 12000); }
        popScreen(); // alert에서 한 단계 뒤로 (이전이 nav면 nav로)
        if (currentScreen === 'alert' && stack[stack.length - 2] !== 'nav') pushScreen('nav');
      };

      // NavScreen에서 뒤로/홈 누르면 → 주행 취소 확인
      const askCancelNav = (target) => () => {
        // 진행 중인 자율 주행도, 저장된 목적지도 없으면 굳이 물어볼 것 없이 바로 동작
        if (navTaskRef.current == null && !activeDest) {
          if (target === 'home') setStack(['home']);
          else popScreen();
          return;
        }
        setConfirm({
          title: target === 'home' ? '홈으로 돌아갈까요?' : '주행을 취소할까요?',
          message: target === 'home' ? '진행 중인 자율 주행이 취소되고 홈 화면으로 이동합니다.' : '진행 중인 자율 주행이 취소됩니다.',
          confirmText: '네, 취소합니다',
          cancelText: '계속 주행',
          tone: 'warn',
          onConfirm: () => {
            setConfirm(null);
            if (navTaskRef.current != null) {
              act.cancelActivity(navTaskRef.current, target === 'home' ? '홈으로 복귀' : '사용자 취소');
              navTaskRef.current = null;
            }
            cancelArrival(); setActiveDest(null);
            if (rosTopics) rosTopics.cmdVelPub.publish(new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular: {x:0, y:0, z:0} }));
            if (target === 'home') setStack(['home']);
            else popScreen();
          },
        });
      };

      // NavScreen에서 수동 버튼 → 조이스틱 화면으로
      const navToManual = () => {
        if (navTaskRef.current != null) {
          act.cancelActivity(navTaskRef.current, '수동 모드 전환');
          navTaskRef.current = null;
        }
        cancelArrival();
        setMode('manual');
        act.logEvent('수동 주행 모드 진입');
        if (rosTopics) rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'm' }));
        pushScreen('joystick');
      };

      // NavScreen에서 자율 버튼 → 이미 자율이지만 명시적으로 표시
      const navToAuto = () => {
        if (mode !== 'auto') {
          setMode('auto');
          act.logEvent('자율 주행 모드 진입');
          if (rosTopics) rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'a' }));
        }
      };

      // 조이스틱 화면 → 자율 모드 복귀 버튼: 기존 목적지가 남아 있으면 같은 경로로 다시 자율 주행 시작
      const joystickToAuto = () => {
        setMode('auto');
        act.logEvent('자율 모드로 복귀');
        if (rosTopics) rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'a' }));
        // 기존 목적지가 있으면 그 경로 그대로 자율 주행 재개
        if (activeDest) {
          if (navTaskRef.current != null) act.cancelActivity(navTaskRef.current, '재개');
          const id = act.startActivity(`자율 주행 재개: ${activeDest.label}`);
          navTaskRef.current = id;
          if (rosTopics) {
            if (activeDest.key === 'home_base') rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'home' }));
            else rosTopics.destPub.publish(new ROSLIB.Message({ data: activeDest.key }));
          }
          scheduleArrival(activeDest.label, 12000);
          // 자율 주행 진행 중에는 nav 화면으로 보장: stack에서 joystick 제거 후 nav가 맨 위가 되게
          setStack(prev => {
            const withoutJoystick = prev.filter(s => s !== 'joystick');
            if (withoutJoystick[withoutJoystick.length - 1] === 'nav') return withoutJoystick;
            return [...withoutJoystick, 'nav'];
          });
        } else {
          // 목적지 없으면 단순 뒤로
          popScreen();
        }
      };

      // 어디서든 수동조작으로 가는 글로벌 핸들러: 진행 중 자율 주행 작업은 취소하지만 activeDest는 유지
      const goToManualAnywhere = () => {
        if (navTaskRef.current != null) {
          act.cancelActivity(navTaskRef.current, '수동 조작 전환');
          navTaskRef.current = null;
        }
        cancelArrival();
        setMode('manual');
        act.logEvent('수동 주행 모드 진입');
        if (rosTopics) rosTopics.modeSwitchPub.publish(new ROSLIB.Message({ data: 'm' }));
        // 이미 joystick이면 그대로, 아니면 push
        setStack(prev => prev[prev.length - 1] === 'joystick' ? prev : [...prev, 'joystick']);
      };

      let screen;
      switch (currentScreen) {
        case 'home':     screen = <HomeScreen t={t} onSearch={goSearch} onGoHome={askGoHomeBase} onSOS={triggerSOS} />; break;
        case 'search':   screen = <SearchScreen t={t} onBack={popScreen} onGoHome={goHomeAll} onStartRoute={askStartNavigation} />; break;
        case 'nav':      screen = <NavScreen t={t} mode={mode} distances={distances} robotWorld={robotWorld} mapConfig={mapConfig} onBack={askCancelNav('back')} onGoHome={askCancelNav('home')} onStop={stopNavigation} onManual={navToManual} onAuto={navToAuto} />; break;
        case 'alert':    screen = <AlertScreen t={t} robotWorld={robotWorld} mapConfig={mapConfig} onResume={resumeNav} onManual={navToManual} onBack={askCancelNav('back')} onGoHome={askCancelNav('home')} onGoHomeBase={askGoHomeBase} />; break;
        case 'joystick': screen = <JoystickScreen t={t} robotWorld={robotWorld} mapConfig={mapConfig} onBack={askCancelNav('back')} onGoHome={askCancelNav('home')} setMode={joystickToAuto} cmdVelPub={rosTopics?.cmdVelPub} />; break;
        default:         screen = <HomeScreen t={t} onSearch={goSearch} onGoHome={askGoHomeBase} onSOS={triggerSOS} />;
      }
      // 어디서든 정지 가능한 글로벌 정지 (진행 중 주행이 있을 때만 표시)
      // 홈 화면에서는 SOS·보호자 pill과 충돌하므로 숨김
      const hasActiveNav = act.activities.some(a => a.status === 'active' && (a.label.startsWith('자율 주행') || a.label.includes('대기소 자동 귀환')));
      const showOverlays = currentScreen !== 'home' && currentScreen !== 'alert';

      return (
        <div style={{ position: 'relative' }}>
          {screen}
          {/* ROS 연결 끊김 배너 - 의료기기 안전 표준상 통신 단절은 명시적으로 표시 */}
          {!rosConnected && (
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0, zIndex: 80,
              padding: '6px 16px',
              background: 'rgba(229, 72, 77, 0.95)',
              color: '#fff',
              fontSize: 12, fontWeight: 800, fontFamily: TOKENS.font.sans,
              textAlign: 'center',
              letterSpacing: 0.5,
            }}>
              ⚠️ 로봇 통신 끊김 — 화면 정보가 실시간이 아닐 수 있습니다
            </div>
          )}
          {/* 글로벌 정지 버튼: 화면 하단 중앙(우측 상단의 보호자 pill·하단의 SOS와 겹치지 않도록 nav 화면 외엔 표시 안 함) */}
          {hasActiveNav && showOverlays && currentScreen !== 'nav' && (
            <button
              onClick={(e) => { e.stopPropagation(); stopNavigation(); }}
              style={{
                position: 'absolute', top: 50, right: 16, zIndex: 70,
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '12px 20px', borderRadius: 999,
                background: TOKENS.color.danger, color: '#fff',
                border: '2px solid rgba(255,255,255,0.9)',
                fontSize: 16, fontWeight: 800, fontFamily: 'inherit',
                cursor: 'pointer',
                boxShadow: '0 8px 24px rgba(229,72,77,0.4)',
              }}
              title="현재 주행 정지"
            >
              <Icon name="stop" size={18} stroke={2.5} /> 정지
            </button>
          )}
          {/* 글로벌 수동조작 버튼: 자체 수동 진입점이 없는 home·search 화면에서만 표시.
              - nav: 하단 중앙 토글에 [수동] 버튼이 있음 → 중복 방지
              - alert: 권장 조치 카드에 [수동 모드 전환] BigButton이 있음 → 중복 방지
              - joystick: 이미 수동 화면이라 의미 없음
              - home: SOS가 좌측 하단에 있으므로 우측 하단에 배치
              - search: 좌측 하단이 비어 있어 좌측 하단에 배치 */}
          {(currentScreen === 'home' || currentScreen === 'search') && (
            <button
              onClick={(e) => { e.stopPropagation(); goToManualAnywhere(); }}
              style={{
                position: 'absolute',
                bottom: 24,
                ...(currentScreen === 'home' ? { right: 24 } : { left: 24 }),
                zIndex: 70,
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '14px 22px', borderRadius: 999,
                background: '#fff', color: TOKENS.color.primaryDark,
                border: `2px solid ${TOKENS.color.primaryDark}`,
                fontSize: 16, fontWeight: 800, fontFamily: 'inherit',
                cursor: 'pointer',
                boxShadow: '0 8px 24px rgba(0,47,108,0.18)',
              }}
              title="수동 조작으로 전환"
            >
              <Icon name="play" size={18} stroke={2.5} /> 수동조작
            </button>
          )}
          <ConfirmDialog
            open={!!confirm}
            title={confirm?.title}
            message={confirm?.message}
            confirmText={confirm?.confirmText}
            cancelText={confirm?.cancelText}
            tone={confirm?.tone}
            onConfirm={confirm?.onConfirm}
            onCancel={() => setConfirm(null)}
          />
          <ArrivalModal
            open={!!arrival}
            label={arrival?.label}
            onDismiss={() => {
              setArrival(null);
              setActiveDest(null);
              setStack(['home']);
            }}
          />
          {currentScreen !== 'home' && <ActivityPanel />}
        </div>
      );
    }

    function App() {
      return <ActivityProvider><AppInner /></ActivityProvider>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
