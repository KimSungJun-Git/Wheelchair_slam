ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 20.0  
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /odom
    odom0_config: [false, false, false, 
                   false, false, false, 
                   true,  false,  false, 
                   false, false, true,  
                   false, false, false] 
    odom0_differential: false

    imu0: /imu/data 
    imu0_config: [false, false, false, 
                  false, false, false,  
                  false, false, false, 
                  false, false, true, 
                  true, false, false] 
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true
    imu0_relative: true